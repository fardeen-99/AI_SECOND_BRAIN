<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="./icons/Product.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Second Brain</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="popup">
    <div class="container">
      <header class="header">
        <div class="brand">
          <div class="brand__icon"></div>
          <div class="brand__text">
            <p class="brand__eyebrow">Second Brain Assistant</p>
            <h1 class="brand__title">Knowledge Archive</h1>
          </div>
        </div>
        <button id="sessionActionButton" class="btn btn--action" type="button">
          Open Library
        </button>
      </header>

      <div class="scroll-area">
        <!-- SESSION STATUS -->
        <section class="section section--session">
          <div class="section__header">
            <h2 id="sessionTitle" class="section__label">Connecting...</h2>
            <span id="sessionBadge" class="badge" data-state="loading">Checking</span>
          </div>
          <p id="sessionDescription" class="section__meta">
            Verifying your secure session with the cloud.
          </p>
        </section>

        <!-- AUTO-CAPTURE (ACTIVE TAB) -->
        <section class="section">
          <div class="section__header">
            <h2 class="section__title">Capture Moment</h2>
          </div>
          <div class="card card--preview">
            <h3 id="activePageTitle" class="card__title">Loading active tab...</h3>
            <p id="activePageUrl" class="card__url">Checking current context...</p>
          </div>
          <button id="saveCurrentPageButton" class="btn btn--primary" type="button">
            Save Current Tab
          </button>
        </section>

        <div class="divider"><span>OR</span></div>

        <!-- MANUAL INPUT (LINK) -->
        <section class="section">
          <div class="section__header">
            <h2 class="section__title">Save External Link</h2>
          </div>
          <form id="linkForm" class="form">
            <div class="input-group">
              <input
                id="linkInput"
                class="input-field"
                type="url"
                placeholder="https://example.com/article"
                autocomplete="off"
              >
            </div>
            <button id="saveLinkButton" class="btn btn--secondary" type="submit">
              Archive Link
            </button>
          </form>
        </section>

        <!-- UPLOAD (FILES) -->
        <section class="section">
          <div class="section__header">
            <h2 class="section__title">Upload Artifact</h2>
          </div>
          <form id="uploadForm" class="form">
            <label class="dropzone" for="fileInput">
              <input id="fileInput" class="dropzone__input" type="file" accept="application/pdf,image/*">
              <span id="fileName" class="dropzone__label">Select PDF or Image</span>
              <span id="fileMeta" class="dropzone__meta">Supports up to 50MB artifacts</span>
            </label>
            <div class="input-group">
              <input
                id="fileTitleInput"
                class="input-field"
                type="text"
                placeholder="Optional artifact title"
                autocomplete="off"
              >
            </div>
            <button id="uploadFileButton" class="btn btn--secondary" type="submit">
              Sync Artifact
            </button>
          </form>
        </section>
      </div>

      <footer class="footer">
        <p id="status" class="status-indicator" data-state="idle">
          Standing by...
        </p>
      </footer>
    </div>
  </main>
  <script src="popup.js"></script>
</body>
</html>
